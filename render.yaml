services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: clearview-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python scripts/seed_outlets.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clearview-db
          property: connectionString
      - key: NEWSAPI_KEY
        sync: false           # Set in Render dashboard
      - key: GOOGLE_FACTCHECK_API_KEY
        sync: false           # Set in Render dashboard
      - key: WEBCITE_API_KEY
        sync: false           # Set in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false           # Set to https://<your-frontend>.onrender.com after first deploy

  # ── Frontend (React/Vite static site) ───────────────────────────────────
  - type: web
    name: clearview-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false           # Set to https://<your-backend>.onrender.com after first deploy

# ── Postgres ─────────────────────────────────────────────────────────────
databases:
  - name: clearview-db
    plan: free
    databaseName: clearview
    user: clearview
